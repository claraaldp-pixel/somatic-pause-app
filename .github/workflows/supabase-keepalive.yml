name: Supabase Keepalive

on:
  schedule:
    - cron: '0 3 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query a real table to keep the database warm
        run: |
          # Must hit an actual table so PostgREST runs a SQL query against Postgres.
          # A bare /rest/v1/ ping only returns the cached schema and does NOT count
          # as database activity, so the project pauses despite the workflow going green.
          BODY=$(curl -s -w "\n%{http_code}" \
            "$SUPABASE_URL/rest/v1/symptom_categories?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          STATUS=$(echo "$BODY" | tail -n1)
          echo "HTTP status: $STATUS"
          # Only a real 2xx from a known-readable table proves Postgres was queried.
          # A paused or still-waking project returns 404 (schema cache not loaded) or
          # 5xx — treat anything but 2xx as a failure so the run goes red, not green.
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "Supabase database was queried — project is alive"
          else
            echo "Unexpected status $STATUS — project may be paused or unavailable"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
